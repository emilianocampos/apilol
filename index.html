<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends | Info & Estadísticas</title>
    <!-- Google Fonts for secondary text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="./img/favicon.png">
    <link rel="stylesheet" href="./estilos/modern_main.css">
</head>

<body>
    <!-- Loader -->
    <div id="loader" class="loader-wrapper">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <p class="loader-text">CARGANDO RUNATERRA...</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-text">LoL<span class="logo-accent">Explorer</span></span>
            </div>
            <div class="nav-info">
                <span class="nav-tagline">Estadísticas & Guías Oficiales</span>
            </div>
        </div>
    </nav>

    <main>
        <section class="seccion">
            <div class="contedor-form">
                <form id="search-form">
                    <div class="form-control">
                        <label for="texto" class="sr-only">Nombre del Campeón</label>
                        <input type="text" id="texto" class="input" placeholder="Ej: Aatrox, Ahri, Yasuo..." autocomplete="off">
                    </div>
                </form>

                <div class="botonera">
                    <button id="boton" title="Ver estadísticas generales y dificultad">
                        <span>Info General</span>
                    </button>
                    <button id="botonhab" title="Ver habilidades del campeón">
                        <span>Habilidades</span>
                    </button>
                    <button id="botonskn" title="Explorar skins disponibles">
                        <span>Skins</span>
                    </button>
                    <button id="botonfullinfo" title="Tips de juego y estadísticas avanzadas">
                        <span>Tips y Guía</span>
                    </button>
                    <button id="btn-show-list" class="btn-secondary" title="Ver todos los campeones disponibles">
                        <span>Ver Lista</span>
                    </button>
                </div>
            </div>
            
            <div id="datos"></div>
            <div id="fotochamp"></div>
        </section>
    </main>

    <!-- Libs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- App Script -->
    <script src="./script/main.js"></script>
</body>

</html>
